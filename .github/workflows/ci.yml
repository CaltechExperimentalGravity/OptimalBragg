name: CI

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: coatingDev
          miniforge-version: latest
      - run: pip install -e .
      - run: pytest tests/ -v --tb=short -k "not slow"

  test_integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: coatingDev
          miniforge-version: latest
      - run: pip install -e .
      - run: pytest tests/test_integration.py -v --tb=short -m slow
