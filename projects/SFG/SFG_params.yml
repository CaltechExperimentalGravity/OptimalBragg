# SFG cavity mirror: 3-wavelength optimization
# Design wavelength: 1064 nm
# - 1064 nm: HR (T = 1000 ppm) + zero surface E-field
# - ~700.3 nm (SFG output, 1/(1/1064+1/2050) nm): AR (T as high as possible)
# - 2050 nm: AR (T as high as possible)

costs:
    # Design wavelength transmission -- HR at 1064 nm
    Trans1:
        target: 1e-3
        weight: 5
    # Brownian noise -- not relevant for SFG cavity
    Brownian:
        target: 100
        weight: 0
    # Thermo-optic noise -- not relevant
    Thermooptic:
        target: 1e-40
        weight: 0
    # Optical thickness sensitivity (legacy, use Sensitivity instead)
    Lsens:
        target: 1e-7
        weight: 0
    # Per-layer curvature (d²T/dL²) penalty — penalizes fragile designs
    # that sit at narrow T peaks.  Target is the mean(d²T/dL²)² budget;
    # zero cost below, quadratic above.  Robust designs ~2000, fragile ~8000.
    Sensitivity:
        target: 5000
        weight: 2
    # Surface E-field intensity -- want low E-field at 1064 nm
    Esurf:
        target: 0.01
        weight: 2
    # Integrated absorption
    Absorption:
        target: 1e-4
        weight: 0
    # Second wavelength -- ~700 nm SFG output (higher T is better)
    Trans2:
        target: 1.0
        weight: 5
    # Third wavelength -- 2050 nm pump (higher T is better)
    Trans3:
        target: 1.0
        weight: 5
    # Optical thickness inhomogeneity
    Lstdev:
        target: 0.5
        weight: 0

misc:
    fTO: 100
    pol: 'te'
    aoi: 0
    Npairs: 12
    Nfixed: 0
    Ncopies: 0
    Nparticles: 5000
    atol: 1e-12
    tol: 1e-6
    # Half-wave SiO2 cap for low surface E-field
    hwcap: 'L'
    init_method: 'halton'
    # Second wavelength ratio: 700.3 nm / 1064 nm
    lambda2: 0.6582
    # Third wavelength ratio: 2050 nm / 1064 nm
    lambda3: 1.9268
    materials_file: 'materials.yml'
    algorithm: 'dual_annealing'
    maxiter: 1000
