#  parameter file for doing cost function minimization for optimal coating design
# aLIGO ETM: SiO2/Ta2O5 at 1064 nm, 294 K

# This specifies the terms to include in your cost function. To exclude
# certain costs from the optimization run, simply set weight to 0.0
costs:
    # Design wavelength transmission
    Trans1:
        target: 5e-6
        weight: 5
    # Brownian noise level (QW proxy for 21 bilayers + cap ~15, optimizer needs ~23)
    Brownian:
        target: 24.0
        weight: 2
    # Thermo-optic noise level (reference: QW S_TO at 100 Hz, 18 bilayers, TiTa2O5)
    Thermooptic:
        target: 1.6e-42
        weight: 2
    # Optical thickness sensitivity
    Lsens:
        target: 1e-7
        weight: 2
    # Surface E-field intensity |1+r|^2 budget (half-wave SiO2 cap gives ~0)
    Esurf:
        target: 0
        weight: 2
    # Integrated absorption - doesn't seem to work?
    Absorption:
        target: 1e-4
        weight: 0
    # Second wavelength transmission (532 nm, 3.2% target per aLIGO spec R=96.8%)
    Trans2:
        target: 0.032
        weight: 3
    # Third wavelength transmission
    Trans3:
        target: 0.05
        weight: 0
    # Optical thickness inhomogeneity
    Lstdev:
        target: 0.5
        weight: 0

# Other parameters used by the code
misc:
    # Frequency (Hz) at which to evaluate TO noise
    fTO: 100
    # Polarization (use "te" or "tm")
    pol: 'te'
    # Angle of incidence (degrees)
    aoi: 0
    # Number of bilayers in variable stack
    Npairs: 21
    # Number of fixed bilayers at the end of the stack
    Nfixed: 0
    # Number of copies of the variable stack
    Ncopies: 0
    # Number of particles in the optimizer (20 x Npairs is a good guess)
    Nparticles: 5000
    # Absolute Tolerance
    atol: 1e-12
    # Relative Tolerance
    tol: 1e-6
    # Half-wave cap layers at the superstrate (surface) side
    # 'L' = SiO2 cap for environmental stability + low surface E-field
    hwcap: 'L'
    # how to initialize the population
    init_method: 'halton'
    # Second wavelength ratio (lambda_2 / lambda_design) -- 532 nm / 1064 nm
    lambda2: 0.5
    # Materials config (replaces gwincStructFile)
    materials_file: 'materials.yml'
